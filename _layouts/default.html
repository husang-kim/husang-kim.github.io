<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Husang Kim</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="keywords" content="Husang Kim, Economics, UT Austin, University of Texas at Austin, Business Cycles, Asset Pricing, Expectation Formation, Taylor Rule, Forecaster Disagreement">
    <meta name="author" content="Husang Kim">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ page.title }} | Husang Kim">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">

    <!-- Google Scholar -->
    <meta name="citation_author" content="Kim, Husang">

    <!-- Google Search Console -->
    <meta name="google-site-verification" content="oXhNp76wANXl6xmX_jKqK9KhUZmJO75C_svBOyl_M9k" />

    <link rel="canonical" href="{{ page.url | absolute_url }}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #6b6b8a;
            --accent: #b35900;
            --accent-hover: #cc6600;
            --bg-primary: #ffffff;
            --border: #e0ddd5;
            --link: #1a5276;
            --link-hover: #2471a3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
            color: var(--text-primary);
            background-color: var(--bg-primary);
            line-height: 1.7;
            font-size: 17px;
        }

        header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 820px;
            margin: 0 auto;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-name {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 28px;
            font-size: 0.95rem;
            font-weight: 400;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active {
            color: var(--accent);
        }

        main {
            max-width: 820px;
            margin: 0 auto;
            padding: 50px 30px 80px;
        }

        /* Typography for Markdown content */
        main h1 {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        main h2 {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 40px;
            margin-bottom: 24px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--accent);
            display: inline-block;
        }

        main p {
            margin-bottom: 12px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        main a {
            color: var(--link);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s, color 0.2s;
        }

        main a:hover {
            color: var(--link-hover);
            border-bottom-color: var(--link-hover);
        }

        main strong {
            color: var(--text-primary);
        }

        main em {
            font-style: italic;
        }

        main ol, main ul {
            margin-bottom: 16px;
            padding-left: 0;
            list-style: none;
        }

        main li {
            margin-bottom: 22px;
            color: var(--text-primary);
        }

        main li p {
            margin-bottom: 4px;
        }

        /* Contact links row */
        .contact-links {
            margin-top: 18px;
            display: flex;
            gap: 22px;
            flex-wrap: wrap;
        }

        .contact-links a {
            color: var(--link);
            font-size: 0.97rem;
        }

        .separator {
            color: var(--border);
            user-select: none;
        }

        /* Paper styling */
        .page-title {
            font-family: 'Source Serif 4', Georgia, serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 40px;
            color: var(--text-primary);
        }

        .paper {
            margin-bottom: 26px;
        }

        .paper-title {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .paper-details {
            color: var(--text-muted);
            font-size: 0.94rem;
            margin-top: 4px;
            line-height: 1.6;
        }

        .paper-links a {
            display: inline-block;
            font-size: 0.88rem;
            font-weight: 600;
            margin-right: 14px;
            padding: 2px 0;
            border-bottom: 1px dashed var(--link);
        }

        .paper-meta {
            color: var(--text-muted);
            font-size: 0.94rem;
            margin-top: 2px;
        }

        footer {
            max-width: 820px;
            margin: 0 auto;
            padding: 30px;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            .header-inner { flex-direction: column; gap: 10px; }
            nav a { margin-left: 0; margin-right: 18px; }
            main h1, .page-title { font-size: 1.7rem; }
            main { padding: 30px 20px 60px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="{{ '/' | relative_url }}" class="site-name">Husang Kim</a>
        <nav>
            <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Main</a>
            <a href="{{ '/research' | relative_url }}" {% if page.url == '/research.html' or page.url == '/research' %}class="active"{% endif %}>Research</a>
        </nav>
    </div>
</header>

<main>
    {{ content }}
</main>

<footer>
    &copy; 2026 Husang Kim
</footer>

</body>
  </html>
